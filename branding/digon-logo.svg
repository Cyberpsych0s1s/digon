<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="digon">
  <!--
    digon — a spherical lune, shaded for volume.

    A "digon" is a 2-gon: two edges meeting at two vertices. On a sphere that is
    a lune. Light comes from the upper-left: the globe is lit there and falls off
    to a dark rim; the arena-sand lune curves like a ribbon over the surface
    (bright where it faces the light, dark on its far edge).

    Palette: petrol globe #123C42 / arena-sand lune #E8B878 -> #CF9A55.
    For small sizes (favicons), prefer the hard-edged digon-logo-flat.svg.
  -->
  <defs>
    <!-- globe: lit upper-left, dark rim lower-right -->
    <radialGradient id="globe" cx="0.36" cy="0.32" r="0.75">
      <stop offset="0%"   stop-color="#2D6672"/>
      <stop offset="42%"  stop-color="#184850"/>
      <stop offset="80%"  stop-color="#0E3138"/>
      <stop offset="100%" stop-color="#0A262B"/>
    </radialGradient>

    <!-- specular highlight on the glass-like surface -->
    <radialGradient id="spec" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#D6ECEC" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#D6ECEC" stop-opacity="0"/>
    </radialGradient>

    <!-- lune: bright near the light (left of centre), dark on the far edge -->
    <linearGradient id="lune" x1="88" y1="0" x2="168" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E2AA66"/>
      <stop offset="26%"  stop-color="#F4CB90"/>
      <stop offset="60%"  stop-color="#CD9450"/>
      <stop offset="100%" stop-color="#9A6A28"/>
    </linearGradient>

    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- sphere -->
  <circle cx="128" cy="128" r="96" fill="url(#globe)"/>
  <circle cx="128" cy="128" r="96" fill="none" stroke="#0A2429" stroke-width="1.5" opacity="0.6"/>

  <!-- glossy highlight (upper-left), clipped to the sphere -->
  <clipPath id="ball"><circle cx="128" cy="128" r="96"/></clipPath>
  <ellipse cx="96" cy="84" rx="42" ry="30" fill="url(#spec)" filter="url(#soft)" clip-path="url(#ball)"/>

  <!-- the lune (full vesica), ribbon-shaded -->
  <path d="M128 32 A 40 96 0 0 0 128 224 A 40 96 0 0 1 128 32 Z" fill="url(#lune)"/>
  <!-- thin sheen along the lit (left) edge -->
  <path d="M128 32 A 40 96 0 0 0 128 224" fill="none" stroke="#FAE0B4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
