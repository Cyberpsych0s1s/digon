<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="256" height="256" role="img" aria-label="digon">
  <!--
    digon — a lune on a wireframe globe.

    Structure (wireframe sphere with solid-front / dashed-back grid, plus a lune
    rotated onto the right hemisphere) after a design by Omar; reskinned with
    digon's palette: a deep petrol globe, muted-teal surface lines, and a warm
    arena-sand lune ("arena" = sand). Dark sphere holds on any background.
  -->
  <defs>
    <radialGradient id="sphereGrad" cx="35%" cy="34%" r="72%">
      <stop offset="0%"   stop-color="#205660"/>
      <stop offset="60%"  stop-color="#10393F"/>
      <stop offset="100%" stop-color="#0A2A30"/>
    </radialGradient>
    <linearGradient id="luneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F4CE92"/>
      <stop offset="100%" stop-color="#C68C44"/>
    </linearGradient>
  </defs>

  <g transform="translate(100,100)">
    <!-- sphere -->
    <circle cx="0" cy="0" r="90" fill="url(#sphereGrad)" stroke="#082A30" stroke-width="2"/>

    <!-- surface grid: solid = front, dashed = behind the sphere -->
    <g stroke="#6FA7B0" fill="none" stroke-width="1.25">
      <path d="M -90 0 A 90 25 0 0 0 90 0" opacity="0.5"/>
      <path d="M -90 0 A 90 25 0 0 1 90 0" opacity="0.28" stroke-dasharray="4,4"/>
      <path d="M 0 -90 A 25 90 0 0 0 0 90" opacity="0.5"/>
      <path d="M 0 -90 A 25 90 0 0 1 0 90" opacity="0.28" stroke-dasharray="4,4"/>
    </g>

    <!-- the lune, rotated onto the right hemisphere -->
    <path d="M 0 -90 A 75 90 0 0 1 0 90 A 25 90 0 0 0 0 -90 Z"
          fill="url(#luneGrad)" stroke="#7A5520" stroke-width="1" stroke-opacity="0.45"/>

    <!-- sheen on the lit face of the lune -->
    <path d="M 0 -90 A 45 90 0 0 1 0 90" fill="none" stroke="#FFF1D6" stroke-opacity="0.3" stroke-width="2"/>
  </g>
</svg>
